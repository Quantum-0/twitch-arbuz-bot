<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quantum0 Novel Extension</title>

  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
}
body {
  background: #000;
  color: #fff;
  width: 320px;
  height: 500px;
  overflow: hidden;
}

/* Контейнер новеллы */
#novel-container {
  position: relative;
  width: 318px;
  height: 500px;
  border: 2px solid #9146ff;
}

/* Картинка персонажа (сцена) */
#character-stage {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: background-image 0.5s ease;
}

/* Диалоговое окно внизу */
#dialogue-box {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  height: 220px;
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid #9146ff;
  border-radius: 8px;
  padding: 10px;
  display: flex;
  gap: 10px;
}

/* Аватарка внутри диалога */
#avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #fff;
  background-size: cover;
  flex-shrink: 0;
  transition: border-color 0.3s;
}

/* Блок с текстом */
#text-container {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}
#speaker-name {
  font-weight: bold;
  color: #ad76ff;
  font-size: 14px;
  margin-bottom: 4px;
}
#speech-text {
  font-size: 13px;
  line-height: 1.4;
  color: #eee;
  word-break: break-word;
}

/* Блок с кнопками выбора */
#choices-container {
  position: absolute;
  bottom: 240px;
  left: 10px;
  right: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  display: none;
}
.choice-btn {
  background: #9146ff;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  text-align: left;
  font-size: 12px;
  transition: background 0.2s;
}
.choice-btn:hover {
  background: #772ce8;
}

  </style>

  <!-- Обязательный скрипт Твича -->
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
</head>
<body>

<div id="toast" style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
     background:#1f1f23;color:#fff;padding:8px 14px;border-radius:6px;
     font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;
     z-index:9999;max-width:90%;text-align:center;"></div>

<div id="novel-container">
  <!-- Сцена с персонажем -->
  <div id="character-stage"></div>

  <!-- Кнопки выбора (скрыты по умолчанию) -->
  <div id="choices-container"></div>

  <!-- Диалоговое окно -->
  <div id="dialogue-box">
    <div id="avatar"></div>
    <div id="text-container">
      <div id="speaker-name">Загрузка...</div>
      <div id="speech-text"></div>
    </div>
  </div>
</div>
  <script>
let twitchAuth = null;
let typingTimer = null;

loadScene('start');

function typeWriter(text, element, speed, onComplete) {
  let i = 0;
  element.innerHTML = '';
  clearInterval(typingTimer);

  typingTimer = setInterval(() => {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
    } else {
      clearInterval(typingTimer);
      if (onComplete) onComplete();
    }
  }, speed);
}

function loadScene(stepKey) {
    if (!twitchAuth) return;

    // Скрываем кнопки прошлых шагов
    document.getElementById('choices-container').style.display = 'none';

    // Делаем запрос к FastAPI за данными сцены
    fetch(`/api/extension/scene/${userData.channel_id}/${stepKey}`, {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + twitchAuth.token
        }
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            const scene = data.scene;

            // Меняем фон, имя и аватарку персонажа (стримера) из данных бэкенда
            document.getElementById('character-stage').style.backgroundImage = `url('${scene.character_img}')`;
            document.getElementById('speaker-name').innerText = scene.speaker;
            document.getElementById('avatar').style.backgroundImage = `url('${scene.avatar}')`;
            document.getElementById('avatar').style.borderColor = '#9146FF';

            // Запускаем печать текста персонажа
            const textElement = document.getElementById('speech-text');
            typeWriter(scene.text, textElement, 30, () => {
                // Показываем варианты ответа, которые прислал бэкенд
                showChoices(scene.choices);
            });
        }
    })
    .catch(err => console.error('Ошибка загрузки сцены:', err));
}

// Показ кнопок выбора (немного измененная под структуру Python)
function showChoices(choices) {
    const container = document.getElementById('choices-container');
    container.innerHTML = '';

    if (!choices || choices.length === 0) return;

    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        // Python отдал ключ "text"
        btn.innerText = choice.text;

        if (choice.link) {
          btn.onclick = () => {
            window.open(choice.link);
          };
        }
        else if (choice.action === "send_chat") {
          btn.onclick = () => {
            // Имитируем ответ пользователя на экране (наш ник и аватарка)
            userReplies(choice.text, async () => {
              try {
                const r = await fetch(`/api/extension/chat/${userData.channel_id}`, {
                  method: "POST",
                  headers: {
                    "Authorization": "Bearer " + twitchAuth.token,
                    "Content-Type": "application/json",
                  },
                  body: JSON.stringify({text: choice.command}),
                });
                if (r.ok) {
                  setTimeout(() => loadScene(choice.next_step), 800);
                } else if (r.status === 429) {
                  showToast("Не удалось отправить сообщение, превышен лимит.", true);
                } else {
                  const err = await r.json().catch(() => ({}));
                  showToast("Не получилось отправить: " + (err.detail || r.status), true);
                }
              } catch (e) {
                showToast("Сетевая ошибка: " + e.message, true);
              }
            });
          };
        }
        else {
          btn.onclick = () => {
            // Имитируем ответ пользователя на экране (наш ник и аватарка)
            userReplies(choice.text, () => {
              // Делаем паузу в 1 секунду и загружаем СЛЕДУЮЩИЙ шаг, который указал бэкенд
              setTimeout(() => {
                // Python отдал ключ "next_step"
                loadScene(choice.next_step);
              }, 1000);
            });
          };
        }

        container.appendChild(btn);
    });

    container.style.display = 'flex';
}

// Тост для уведомлений об ошибках/успехе
let toastTimer = null;
function showToast(msg, isError) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.background = isError ? '#a33' : '#1f1f23';
    toast.style.opacity = '1';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// Переменные для хранения данных пользователя
let userData = {
    name: 'Зритель',
    avatar: 'https://placehold.co',
    channel_id: null,
};

// Инициализация Twitch Extension
window.Twitch.ext.onAuthorized(async (auth) => {
  twitchAuth = auth;

  // Проверяем, дал ли пользователь разрешение на просмотр его ID
  if (window.Twitch.ext.viewer.isLinked) {
    // Если доступ есть, запрашиваем данные профиля с нашего FastAPI бэкенда
    await fetchUserData(twitchAuth);
  } else {
    // Если доступа нет, предлагаем привязать аккаунт
    // Твич сам покажет всплывающее окно
    window.Twitch.ext.actions.requestIdShare();
  }

  // Запускаем новеллу
  loadScene('start');
});

// Слушаем событие, если пользователь нажал "Разрешить доступ" прямо во время игры
window.Twitch.ext.viewer.onChanged(async () => {
  if (window.Twitch.ext.viewer.isLinked && twitchAuth) {
    await fetchUserData(twitchAuth);
  }
});

// Функция запроса данных пользователя через ваш сервер
async function fetchUserData(auth) {
  const endpointUrl = "https://api.twitch.tv/helix/users";
  const url = `${endpointUrl}?id=${window.Twitch.ext.viewer.id}`;
  const response = await fetch(url, {
    headers: {
      "client-id": auth.clientId,
      Authorization: `Extension ${auth.helixToken}`,
    },
  });
  const body = await response.json();
  console.log("Username:", body.data.at(0)?.display_name)
  console.log("Pfp:", body.data.at(0)?.profile_image_url)
  console.log(body.data.at(0))
  userData.name = body.data.at(0)?.display_name
  userData.avatar = body.data.at(0)?.profile_image_url
  userData.channel_id = auth.channelId;
}

// Модифицированная функция ответа пользователя (из прошлого шага)
function userReplies(userText, onDone) {
    document.getElementById('choices-container').style.display = 'none';

    document.getElementById('speaker-name').innerText = userData.name;
    document.getElementById('avatar').style.backgroundImage = `url('${userData.avatar}')`;
    document.getElementById('avatar').style.borderColor = '#00FF7F';

    const textElement = document.getElementById('speech-text');
    typeWriter(userText, textElement, 30, onDone);
}

  </script>
</body>
</html>
