<!DOCTYPE html>
<html>

<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quantum0 Novel Extension</title>

  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: sans-serif;
}
body {
  background: #000;
  color: #fff;
  width: 320px;
  height: 500px;
  overflow: hidden;
}

/* Контейнер новеллы */
#novel-container {
  position: relative;
  width: 318px;
  height: 500px;
  border: 2px solid #9146ff;
}

/* Картинка персонажа (сцена) */
#character-stage {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: background-image 0.5s ease;
}

/* Диалоговое окно внизу */
#dialogue-box {
  position: absolute;
  bottom: 10px;
  left: 10px;
  right: 10px;
  height: 130px;
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid #9146ff;
  border-radius: 8px;
  padding: 10px;
  display: flex;
  gap: 10px;
}

/* Аватарка внутри диалога */
#avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid #fff;
  background-size: cover;
  flex-shrink: 0;
  transition: border-color 0.3s;
}

/* Блок с текстом */
#text-container {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}
#speaker-name {
  font-weight: bold;
  color: #ad76ff;
  font-size: 14px;
  margin-bottom: 4px;
}
#speech-text {
  font-size: 13px;
  line-height: 1.4;
  color: #eee;
  word-break: break-word;
}

/* Блок с кнопками выбора */
#choices-container {
  position: absolute;
  bottom: 150px;
  left: 10px;
  right: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  display: none;
}
.choice-btn {
  background: #9146ff;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 4px;
  cursor: pointer;
  text-align: left;
  font-size: 12px;
  transition: background 0.2s;
}
.choice-btn:hover {
  background: #772ce8;
}

  </style>

  <!-- Обязательный скрипт Твича -->
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
</head>
<body>

<div id="novel-container">
  <!-- Сцена с персонажем -->
  <div id="character-stage"></div>

  <!-- Кнопки выбора (скрыты по умолчанию) -->
  <div id="choices-container"></div>

  <!-- Диалоговое окно -->
  <div id="dialogue-box">
    <div id="avatar"></div>
    <div id="text-container">
      <div id="speaker-name">Загрузка...</div>
      <div id="speech-text"></div>
    </div>
  </div>
</div>
  <script>
    // Тестовая база данных "сцен" новеллы
const story = {
  start: {
    character_img:
      'https://avatarko.ru/img/kartinka/14/zhivotnye_kot_13379.jpg', // Сюда ссылку на вашего персонажа (радостный)
    speaker: 'Quantum0',
    avatar: 'https://avatarko.ru/img/kartinka/14/zhivotnye_kot_13379.jpg', // Ваша аватарка
    text: 'Привет! Добро пожаловать на мой стрим. Готов проверить, на что способен мой чат-бот?',
    choices: [
      { text: 'Да, давай настроим!', nextStep: 'setup_bot' },
      { text: 'А что он умеет?', nextStep: 'ask_features' },
    ],
  },
  setup_bot: {
    character_img: 'https://placehold.co',
    speaker: 'Quantum0',
    avatar: 'https://placehold.co',
    text: 'Отлично! Секунду, отправляю запрос на сервер... Всё готово, бот запущен в твоем чате!',
    choices: [], // Финал ветки, кнопок нет
  },
  ask_features: {
    character_img: 'https://placehold.co', // Персонаж задумался
    speaker: 'Quantum0',
    avatar: 'https://placehold.co',
    text: 'Он умеет модерировать чат, устраивать розыгрыши и выводить кастомные виджеты прямо на экран!',
    choices: [{ text: 'Круто, запускаем!', nextStep: 'setup_bot' }],
  },
};

let twitchAuth = null;
let typingTimer = null;

// Инициализация Twitch Extension
/*window.Twitch.ext.onAuthorized((auth) => {
    twitchAuth = auth;
    // Начинаем новеллу со сцены "start"
    loadScene('start');
});*/

loadScene('start');

// Функция плавной печати текста
function typeWriter(text, element, speed, onComplete) {
  let i = 0;
  element.innerHTML = '';
  clearInterval(typingTimer);

  typingTimer = setInterval(() => {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
    } else {
      clearInterval(typingTimer);
      if (onComplete) onComplete();
    }
  }, speed);
}

// Загрузка сцены персонажа
function loadScene(stepKey) {
  const scene = story[stepKey];
  if (!scene) return;

  // Скрываем кнопки прошлых шагов
  document.getElementById('choices-container').style.display = 'none';

  // Меняем фон, имя и аватарку стримера
  document.getElementById('character-stage').style.backgroundImage =
    `url('${scene.character_img}')`;
  document.getElementById('speaker-name').innerText = scene.speaker;
  document.getElementById('avatar').style.backgroundImage =
    `url('${scene.avatar}')`;
  document.getElementById('avatar').style.borderColor = '#9146FF'; // Фиолетовый цвет стримера

  // Запускаем печать текста персонажа
  const textElement = document.getElementById('speech-text');
  typeWriter(scene.text, textElement, 30, () => {
    // Когда персонаж договорил — показываем варианты ответа
    showChoices(scene.choices, stepKey);
  });
}

// Показ кнопок выбора
function showChoices(choices, currentStepKey) {
  const container = document.getElementById('choices-container');
  container.innerHTML = '';

  if (choices.length === 0) return;

  choices.forEach((choice) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerText = choice.text;

    btn.onclick = () => {
      // Имитируем ответ пользователя внутри панели
      userReplies(choice.text, () => {
        // Опционально: Отправляем выбор на ваш FastAPI бэкенд
        sendChoiceToBackend(currentStepKey, choice.text);

        // Переходим к следующему шагу персонажа
        setTimeout(() => {
          loadScene(choice.nextStep);
        }, 1000); // Небольшая пауза перед ответом персонажа
      });
    };

    container.appendChild(btn);
  });

  container.style.display = 'flex';
}

// Имитация ответа пользователя
function userReplies(userText, onDone) {
  document.getElementById('choices-container').style.display = 'none';

  // Меняем имя на "Вы" (или можно запрашивать ник из Твича)
  document.getElementById('speaker-name').innerText = 'Вы';

  // Ставим дефолтную аватарку пользователя (или пустую)
  document.getElementById('avatar').style.backgroundImage =
    `url('https://placehold.co')`;
  document.getElementById('avatar').style.borderColor = '#00FF7F'; // Зеленый цвет для зрителя

  const textElement = document.getElementById('speech-text');
  typeWriter(userText, textElement, 30, onDone);
}

// Функция для связи с вашим Python сервером
function sendChoiceToBackend(step, choiceText) {
  if (!twitchAuth) return;

  fetch('https://your-server.com', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + twitchAuth.token,
    },
    body: JSON.stringify({
      channel_id: twitchAuth.channelId,
      step: step,
      user_choice: choiceText,
    }),
  }).catch((err) => console.log('Бэкенд пока не подключен, работаем локально'));
}

window.Twitch.ext.onAuthorized((auth) => {
  console.log("Twitch расширение успешно авторизовано!");
  console.log("Токен пользователя:", auth.token);

  // ТОЛЬКО ПОСЛЕ ЭТОГО момента можно включать ваш интерфейс
  // Например: document.getElementById('app').style.display = 'block';
});

  </script>
</body>
</html>
