<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>EvT (Pulsma)</title>
    <style>
  body {
    margin: 0;
    padding: 0;
    background-color: transparent;
    font-family: Arial, sans-serif;
    color: #fff;
  }

  .music-card {
    position: relative;
    width: 400px;
    margin: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    transition: background-color 0.5s ease, width 0.3s ease;
    background-color: #2f2f2f;
  }

  .music-card.auto-size {
    width: fit-content;
    min-width: 200px;
    max-width: 100%;
  }

  .music-card-content {
    display: flex;
    align-items: center;
    padding: 10px;
    opacity: 1;
  }

  .album-art {
    --size: 50px;
    width: var(--size);
    height: var(--size);
    object-fit: cover;
    border-radius: 5px;
    margin-right: 10px;
    transition: opacity 0.5s ease;
  }

  .track-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  .track-title {
    font-size: 16px;
    font-weight: bold;
    margin: 0 0 3px 0;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }

  .track-artist {
    font-size: 14px;
    color: #ccc;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }

  .track-status {
    font-size: 13px;
    color: #999;
  }

  @keyframes slideOut {
    0% {
      transform: translateX(0);
      opacity: 1;
    }
    100% {
      transform: translateX(-100%);
      opacity: 0;
    }
  }
  @keyframes slideIn {
    0% {
      transform: translateX(100%);
      opacity: 0;
    }
    100% {
      transform: translateX(0);
      opacity: 1;
    }
  }
  .slideOut {
    animation: slideOut 0.5s forwards;
  }
  .slideIn {
    animation: slideIn 0.5s forwards;
  }
    </style>
  </head>
  <body>
    <div class="music-card" id="music-card">
      <div class="music-card-content" id="music-card-content">
        <img
          id="albumArt"
          class="album-art"
          src="/static/images/stickers/5.webp"
          alt="Album Art"
        />
        <div class="track-info">
          <div id="trackTitle" class="track-title"></div>
          <div id="trackArtist" class="track-artist"></div>
        </div>
      </div>
    </div>
    <script>
        const API_BASE_URL = "http://127.0.0.1:2007";

const apiState = {
  trackId: null,
  status: null,
  lastApiPosition: 0
};

async function fetchTrackStatusFromApi() {
  const url = `${API_BASE_URL}/get_track`;

  const response = await fetch(url, {
    headers: { accept: "*/*" }
  });

  if (!response.ok) {
    throw new Error(`API Error: ${response.status} ${response.statusText}`);
  }

  const data = await response.json();
  if (!data?.track) {
    console.warn("[api] Нет трека в ответе API");
    return null;
  }

  const isNewTrack      = data.track.realId !== apiState.trackId;
  const isStatusChanged = data.status !== apiState.status;

  const apiPos = data.progress.position;
  let isSeekChanged = false;

  if (data.status === "paused") {
    isSeekChanged = Math.abs(apiPos - apiState.lastApiPosition) > 1;
  } else if (data.status === "playing") {
    isSeekChanged = Math.abs(apiPos - apiState.lastApiPosition) > 2.5;
  }

  if (!isNewTrack && !isStatusChanged && !isSeekChanged) {
    console.log("[tick] Нет изменений — UI не трогаем");
    return null;
  }

  const changes = [];
  if (isNewTrack)      changes.push("🎵 новый трек");
  if (isStatusChanged) changes.push(`⏯ статус: ${apiState.status} → ${data.status}`);
  if (isSeekChanged)   changes.push(`⏱ позиция: ${apiState.lastApiPosition.toFixed(2)} → ${apiPos.toFixed(2)}`);

  console.log(`[tick] Обнаружены изменения: ${changes.join(", ")}`);

  apiState.trackId = data.track.realId;
  apiState.status = data.status;
  apiState.lastApiPosition = apiPos;

  return data;
}

window.fetchTrackStatusFromApi = fetchTrackStatusFromApi;
    </script>
    <script>
        function getDarkenedColorFromImage(image, BRIGHTNESS_THRESHOLD) {
  if (!image || !image.naturalWidth) {
    return "rgb(47, 47, 47)";
  }

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  if (!ctx) {
    return "rgb(47, 47, 47)";
  }
  canvas.width = 1;
  canvas.height = 1;
  try {
    ctx.drawImage(image, 0, 0, 1, 1);
  } catch (err) {
    return "rgb(47, 47, 47)";
  }

  const pixelData = ctx.getImageData(0, 0, 1, 1).data;
  let [r, g, b] = pixelData;

  const brightness = 0.299 * r + 0.587 * g + 0.114 * b;

  let factor;
  if (brightness === 0) {
    r = g = b = BRIGHTNESS_THRESHOLD;
  } else {
    factor = BRIGHTNESS_THRESHOLD / brightness;
    factor = Math.max(0, Math.min(factor, 5.5));
    r = Math.min(255, Math.round(r * factor));
    g = Math.min(255, Math.round(g * factor));
    b = Math.min(255, Math.round(b * factor));
  }

  return `rgb(${r}, ${g}, ${b})`;
}
    </script>
    <script>
        function animateMatrixText(element, finalText, speed = 50) {
          if (!finalText) {
            element.textContent = "";
            return;
          }

          const chars = "@#$%&?";

          let displayArr = [];
          for (let i = 0; i < finalText.length; i++) {
            const randIndex = Math.floor(Math.random() * chars.length);
            displayArr.push(chars[randIndex]);
          }
          element.textContent = displayArr.join("");

          let currentIndex = 0;
          const interval = setInterval(() => {
            displayArr[currentIndex] = finalText[currentIndex];
            element.textContent = displayArr.join("");
            currentIndex++;

            if (currentIndex >= finalText.length) {
              clearInterval(interval);
            }
          }, speed);
        }
    </script>
    <script>
        let oldTrackId = null;

        let pendingTitle = "";
        let pendingArtist = "";
        let pendingStatus = "";

        function getURLParams() {
          const urlParams = new URLSearchParams(window.location.search);

          const fade = parseFloat(urlParams.get("fade"));
          const fadeOpacity = isNaN(fade) || fade < 0 || fade > 1 ? 1 : fade;

          const autoColorParam = urlParams.get("autoColor");
          const autoColor = autoColorParam === null || autoColorParam === "true";

          const autoSizeParam = urlParams.get("autoSize");
          const autoSize = autoSizeParam === null || autoSizeParam === "true";

          const position = urlParams.get("position") || "top-left";
          const offsetX = parseFloat(urlParams.get("offsetX")) || 25;
          const offsetY = parseFloat(urlParams.get("offsetY")) || 25;

          return { fadeOpacity, autoColor, autoSize, position, offsetX, offsetY };
        }

        const { fadeOpacity, autoColor, autoSize, position, offsetX, offsetY } =
          getURLParams();

        const cardContent = document.getElementById("music-card-content");
        const albumArtEl = document.getElementById("albumArt");
        const trackTitleEl = document.getElementById("trackTitle");
        const trackArtistEl = document.getElementById("trackArtist");
        const cardEl = document.getElementById("music-card");

        if (autoSize) {
          cardEl.classList.add("auto-size");
        }

        function applyPosition() {
          cardEl.style.position = "fixed";
          cardEl.style.margin = "0";
          cardEl.style.zIndex = "9999";
          cardEl.style.transform = "";
          cardEl.style.top = "";
          cardEl.style.bottom = "";
          cardEl.style.left = "";
          cardEl.style.right = "";

          switch (position) {
            case "top-left":
              cardEl.style.top = `${offsetY}px`;
              cardEl.style.left = `${offsetX}px`;
              break;
            case "top-right":
              cardEl.style.top = `${offsetY}px`;
              cardEl.style.right = `${offsetX}px`;
              break;
            case "bottom-left":
              cardEl.style.bottom = `${offsetY}px`;
              cardEl.style.left = `${offsetX}px`;
              break;
            case "bottom-right":
              cardEl.style.bottom = `${offsetY}px`;
              cardEl.style.right = `${offsetX}px`;
              break;
            case "center":
              cardEl.style.top = `calc(50% + ${offsetY}px)`;
              cardEl.style.left = `calc(50% + ${offsetX}px)`;
              cardEl.style.transform = "translate(-50%, -50%)";
              break;
            default:
              cardEl.style.top = `${offsetY}px`;
              cardEl.style.left = `${offsetX}px`;
              break;
          }
        }

        function measureTextWidth(text, element) {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          if (!ctx) return 0;

          const style = window.getComputedStyle(element);
          const font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
          ctx.font = font;
          return Math.ceil(ctx.measureText(text || "").width);
        }

        function resizeCard(titleText = pendingTitle, artistText = pendingArtist) {
          if (!autoSize) return;

          const titleWidth = measureTextWidth(titleText, trackTitleEl);
          const artistWidth = measureTextWidth(artistText, trackArtistEl);
          const maxTextWidth = Math.max(titleWidth, artistWidth);

          const artWidth = 50;
          const padding = 20;
          const gap = 10;
          const newWidth = artWidth + gap + maxTextWidth + padding;

          cardEl.style.width = Math.max(200, newWidth) + "px";
        }

        async function fetchTrackStatus() {
          try {
            const data = await fetchTrackStatusFromApi();

            if (data?.track) {
              const newTrackId = data.track.realId;

              if (newTrackId !== oldTrackId) {
                oldTrackId = newTrackId;
                animateTrackChange(data.track);
              }
            } else {
              console.warn("Некорректные данные");
            }
          } catch (error) {
            console.error("Ошибка при получении данных о треке:", error);
          }
        }

        function animateTrackChange(track) {
          cardContent.classList.add("slideOut");

          setTimeout(() => {
            cardContent.classList.remove("slideOut");

            trackTitleEl.textContent = "";
            trackArtistEl.textContent = "";

            updateCard(track);

            cardContent.classList.add("slideIn");
            setTimeout(() => {
              cardContent.classList.remove("slideIn");

              animateMatrixText(trackTitleEl, pendingTitle, 50);
              animateMatrixText(trackArtistEl, pendingArtist, 50);

              if (autoSize) {
                const maxLength = Math.max(pendingTitle.length, pendingArtist.length);
                const animationDuration = maxLength * 50;

                resizeCard(pendingTitle, pendingArtist);

                setTimeout(() => {
                  resizeCard(pendingTitle, pendingArtist);
                }, animationDuration / 2);

                setTimeout(() => {
                  resizeCard(pendingTitle, pendingArtist);
                  setTimeout(() => {
                    resizeCard(pendingTitle, pendingArtist);
                  }, 100);
                }, animationDuration + 50);
              }
            }, 500);
          }, 500);
        }

        function updateCard(track) {
          albumArtEl.style.opacity = 0;
          albumArtEl.src = "default.png";

          let newAlbumArt = null;
          if (track?.coverUri) {
            newAlbumArt = `https://${track?.coverUri.replace("%%", "1000x1000")}`;
          }
          if (newAlbumArt) {
            const tempImg = new Image();
            tempImg.crossOrigin = "anonymous";
            tempImg.onload = () => {
              albumArtEl.src = newAlbumArt;
              setTimeout(() => {
                albumArtEl.style.opacity = 1;
              }, 50);

              try {
                if (autoColor) {
                  const color = getDarkenedColorFromImage(tempImg, 40);
                  let r, g, b;
                  if (color.startsWith("rgb")) {
                    const match = color.match(/\d+/g);
                    if (match) {
                      r = parseInt(match[0]);
                      g = parseInt(match[1]);
                      b = parseInt(match[2]);
                    } else {
                      r = g = b = 47;
                    }
                  } else if (color.startsWith("#")) {
                    r = parseInt(color.slice(1, 3), 16);
                    g = parseInt(color.slice(3, 5), 16);
                    b = parseInt(color.slice(5, 7), 16);
                  } else {
                    r = g = b = 47;
                  }
                  cardEl.style.backgroundColor = `rgba(${r}, ${g}, ${b}, ${fadeOpacity})`;
                } else {
                  cardEl.style.backgroundColor = `rgba(47, 47, 47, ${fadeOpacity})`;
                }
              } catch (err) {
                console.warn("Ошибка при getImageData():", err);
                cardEl.style.backgroundColor = `rgba(47, 47, 47, ${fadeOpacity})`;
              }
            };
            tempImg.onerror = () => {
              albumArtEl.src = "default.png";
              albumArtEl.style.opacity = 1;
              cardEl.style.backgroundColor = `rgba(47, 47, 47, ${fadeOpacity})`;
            };
            tempImg.src = newAlbumArt;
          } else {
            albumArtEl.style.opacity = 1;
            cardEl.style.backgroundColor = `rgba(47, 47, 47, ${fadeOpacity})`;
          }

          pendingTitle = track.title || "Unknown Title";
          if (track.artists && track.artists.length > 0) {
            pendingArtist = track.artists[0].name || "Unknown Artist";
          } else {
            pendingArtist = "Unknown Artist";
          }
          pendingStatus = `Статус: ${track.status}`;
        }

        cardEl.style.backgroundColor = `rgba(47, 47, 47, ${fadeOpacity})`;
        applyPosition();

        fetchTrackStatus().then(() => {
          if (autoSize) {
            setTimeout(() => resizeCard(), 100);
            setTimeout(() => resizeCard(), 500);
            setTimeout(() => resizeCard(), 1000);
          }
        });

        if (autoSize) {
          setInterval(() => {
            resizeCard();
          }, 2000);
        }

        setInterval(fetchTrackStatus, 1000);
    </script>
  </body>
</html>
