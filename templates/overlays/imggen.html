<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SSE PNG Overlay</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        .sprite {
            position: absolute;
            width: {{ sticker_size }}px;
            height: {{ sticker_size }}px;
            pointer-events: none;
            opacity: 0;
            will-change: transform, left, top, opacity;
        }

        .sprite.spawn {
            animation: sticker-pop 350ms cubic-bezier(.34,1.56,.64,1) forwards;
        }

        .fade-out {
            opacity: 0;
            transition: opacity 2s linear;
        }

        @keyframes sticker-pop {
            0% {
                transform: scale(0) rotate(var(--rotation) - 40deg);
                opacity: 0;
            }
            60% {
                transform: scale(1.25) rotate(calc(var(--rotation) + 18deg));
                opacity: 1;
            }
            80% {
                transform: scale(0.90) rotate(calc(var(--rotation) - 10deg));
            }
            100% {
                transform: scale(1) rotate(var(--rotation));
                opacity: 1;
            }
        }

    </style>
</head>
<body>

<audio id="sticker-sound" preload="auto">
    <source src="/static/sounds/sticker-pop.mp3" type="audio/mpeg">
</audio>

<script>
    const SSE_URL = "{{ request.base_url }}sse/{{ channel_id }}/ai-sticker";
    const RETRY_URL = "{{ request.base_url }}api/user/not-shown-sticker-id?channel={{ channel_id }}";
    const IMAGE_BASE_URL = "{{ request.base_url }}files/ai-gen-stickers/";

    const LIFE_TIME_MS = {{ sticker_lifetime }} * 1000;
    const FADE_OUT_MS = 2_000;
    const RETRY_INTERVAL_MS = 30_000;

    const STICKER_SIZE = {{ sticker_size }};
    // Запас на анимацию pop (scale до 1.25 → +12.5% с каждой стороны) и поворот (±45°)
    const EDGE_PADDING = Math.ceil(STICKER_SIZE * 0.15);

    let zIndexCounter = 1;

    const eventSource = new EventSource(SSE_URL);

    eventSource.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            const fileId = data.sticker_file_id;

            if (fileId) {
                // Формируем полный URL к картинке
                const fullImageUrl = `${IMAGE_BASE_URL}${fileId}?mark_viewed=1&t=${new Date().getTime()}`;
                spawnImage(fullImageUrl);
            }
        } catch (e) {
            console.error("SSE parse error:", e);
        }
    };

    eventSource.onerror = (e) => {
        console.error("SSE error:", e);
    };

    // --- Логика Retry (Polling) ---
    async function checkMissingStickers() {
        try {
            const response = await fetch(RETRY_URL);

            // Если вернулся 200 OK
            if (response.ok) {
                const data = await response.json();
                if (data.id) {
                    spawnImage(`${IMAGE_BASE_URL}${data.id}?mark_viewed=1&t=${new Date().getTime()}`);
                }
            }
            // Если 404 или другие ошибки — просто игнорируем согласно условию
        } catch (e) {
            console.error("Retry request failed:", e);
        }
    }

    setInterval(checkMissingStickers, RETRY_INTERVAL_MS);

    function spawnImage(imgUrl) {
        const img = document.createElement("img");
        img.className = "sprite";

        // Задаем координаты и стили сразу, до вставки в DOM
        img.style.zIndex = zIndexCounter++;

        const maxX = Math.max(EDGE_PADDING, window.innerWidth - STICKER_SIZE - EDGE_PADDING);
        const maxY = Math.max(EDGE_PADDING, window.innerHeight - STICKER_SIZE - EDGE_PADDING);

        const x = EDGE_PADDING + Math.random() * (maxX - EDGE_PADDING);
        const y = EDGE_PADDING + Math.random() * (maxY - EDGE_PADDING);
        const rotation = random(-45, 45);

        img.style.left = `${x}px`;
        img.style.top = `${y}px`;
        img.style.setProperty("--rotation", `${rotation}deg`);

        // Логика запускается ТОЛЬКО после загрузки файла
        img.onload = () => {
            document.body.appendChild(img);

            // триггер анимации появления
            requestAnimationFrame(() => {
                img.classList.add("spawn");
            });

            // 🔊 звук играет одновременно с появлением изображения
            playPopSound();

            // Таймер начала исчезновения (fade-out)
            setTimeout(() => {
                img.classList.add("fade-out");
            }, LIFE_TIME_MS - FADE_OUT_MS);

            // Таймер полного удаления из DOM
            setTimeout(() => {
                img.remove();
            }, LIFE_TIME_MS);
        };

        img.onerror = () => {
            console.error("Не удалось загрузить стикер:", imgUrl);
        };

        // Назначаем src в самом конце, чтобы событие onload сработало корректно во всех браузерах
        img.src = imgUrl;
    }

    function random(min, max) {
        return Math.random() * (max - min) + min;
    }

    function playPopSound() {
        // Создаем новый объект каждый раз (браузер все равно возьмет файл из кэша)
        const audio = new Audio("/static/sounds/sticker-pop.mp3");
        audio.play().catch(e => {
            console.warn("Звук заблокирован или не загрузился:", e);
        });
    }
</script>

</body>
</html>
